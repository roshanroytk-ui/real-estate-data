name: Refresh Polygon Cache

on:
  schedule:
    - cron: "0 0 */3 * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  polygon-refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests
          pip install pandas
          pip install shapely
          pip install geopandas
          pip install pyogrio

      - name: Run polygon refresh
        run: python overpass_fallback.py

      - name: Commit updated cache
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add polygon_cache.geojson

          git commit -m "Refresh polygon cache" || echo "No changes"

          git push
